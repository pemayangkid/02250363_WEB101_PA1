<!doctype html>
<html lang="en">
  <head>
    <!-- Defines the character encoding for proper text display -->
    <meta charset="UTF-8" />

    <!-- Sets the favicon (icon shown in browser tab) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Makes the layout responsive on different screen sizes -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title of the webpage shown in the browser tab -->
    <title>my-app</title>
  </head>

  <body>
    <!-- This is the root container where the React app will be rendered -->
    <div id="root"></div>

    <!-- Links the main React entry file (main.jsx) to the HTML -->
    <!-- This is where React takes control of the page -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
